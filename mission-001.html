<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mission 001 — Find the Golden Feather | Morfu</title>
<style>
body{
font-family:Arial,sans-serif;
margin:0;
background:linear-gradient(#8ee8ff,#fff5d8);
text-align:center;
color:#173b5c;
}
.game{
max-width:900px;
margin:40px auto;
padding:30px;
}
h1{font-size:42px}
.message{
background:white;
border-radius:25px;
padding:20px;
box-shadow:0 8px 20px #0002;
}
.ocean{
position:relative;
height:450px;
margin-top:30px;
background:#49c7e8;
border-radius:35px;
overflow:hidden;
}
.item{
position:absolute;
font-size:55px;
cursor:pointer;
transition:.2s;
}
.item:hover{transform:scale(1.2)}
#result{
font-size:28px;
margin:20px;
font-weight:bold;
}
button{
background:#ffc83d;
border:0;
padding:15px 35px;
border-radius:30px;
font-size:20px;
cursor:pointer;
}
</style>
</head>
<body>

<div class="game">
<h1>🌊 Mission 001</h1>

<div class="message">
<h2>Find the Golden Feather!</h2>
<p>Hello Explorer! Can you help Morfu find the magic feather?</p>
</div>

<div class="ocean">
<div class="item" style="left:10%;top:60%">🐚</div>
<div class="item" style="left:30%;top:25%">🐟</div>
<div class="item" style="left:55%;top:65%">⭐</div>
<div class="item" style="left:75%;top:30%">🪨</div>
<div class="item" id="feather" style="left:45%;top:40%">🪶</div>
</div>

<div id="result"></div>
<button onclick="location.reload()">Play Again</button>

</div>

<script>
document.querySelectorAll('.item').forEach(item=>{
item.onclick=()=>{
if(item.id==="feather"){
document.getElementById('result').innerHTML="✨ Amazing Explorer! You found the Golden Feather! 🏅";
}else{
document.getElementById('result').innerHTML="Keep searching! Morfu needs your help 💛";
}
}
});
</script>

</body>
</html>
